<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XSS Message Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>XSS Message Board (Safe Version)</h2>

  <textarea id="input" placeholder="Enter message"></textarea>
  <br>

  <button id="post">Post Message</button>
  <button id="clear">Clear</button>

  <p id="status"></p>

  <h3>Messages:</h3>
  <ul id="messages"></ul>

  <script src="script.js"></script>
</body>
</html>
